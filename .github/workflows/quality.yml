name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # kbot-io is a public Go module, so no auth is needed to fetch it.
      - name: Download Go modules
        run: go mod download

      - name: Verify formatting
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
        env:
          ALLOW_SKIP_ASSETS: "true"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Pin golangci-lint to the version used locally / by the kbot repo.
      # `version: latest` on golangci-lint-action resolves to a v1 build
      # compiled with an older Go than this module's `go` directive, which the
      # linter rejects ("built with go1.24 ... lower than the targeted Go
      # version 1.25.5"). The pinned v2 release is prebuilt with a newer Go, so
      # it satisfies that gate and matches the local `golangci-lint run ./...`.
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: golangci-lint
        run: golangci-lint run ./...
